<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety Detective — Spot the Hazards!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;800&family=Figtree:wght@400;500;600&display=swap');
  :root{--bg:#f0ece4;--card:#fff;--text:#1a1a1a;--muted:#7a7a7a;--accent:#c9402d;--ag:rgba(201,64,45,.13);--ok:#27784a;--okb:rgba(39,120,74,.10);--miss:#a07516;--mb:rgba(160,117,22,.08);--border:#ddd8ce;--sh:rgba(0,0,0,.05)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;min-height:100vh}
  .topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px var(--sh)}
  .tl{display:flex;align-items:center;gap:10px}
  .ti{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px var(--ag)}
  h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:-.3px}
  .tag{font-size:.72rem;color:var(--muted)}
  .sb{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:18px;font-size:.78rem;font-weight:600}
  .pill.f{background:var(--okb);color:var(--ok);border:1px solid rgba(39,120,74,.18)}
  .pill.t{background:var(--ag);color:var(--accent);border:1px solid rgba(201,64,45,.18)}
  .pill .n{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.05rem}
  .pw{padding:0 20px;margin-top:14px}
  .po{width:100%;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
  .pi{height:100%;background:linear-gradient(90deg,var(--ok),#4ade80);border-radius:4px;transition:width .5s;width:0%}
  .pl{font-size:.68rem;color:var(--muted);margin-top:5px;text-align:right}
  .main{max-width:1100px;margin:0 auto;padding:16px 20px 40px}
  .sc{position:relative;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:#fff;cursor:crosshair;user-select:none;box-shadow:0 4px 20px var(--sh)}
  .sc img{display:block;width:100%;height:auto;pointer-events:none}
  .z{position:absolute;border-radius:6px;pointer-events:none;transition:all .3s}
  .z.fd{background:rgba(39,120,74,.18);border:2.5px solid var(--ok);pointer-events:auto;animation:zP .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes zP{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .zn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;background:var(--ok);color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.72rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(39,120,74,.35)}
  .zt{position:fixed;background:var(--ok);color:#fff;padding:6px 12px;border-radius:8px;font-size:.72rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;pointer-events:none;z-index:100;max-width:240px;text-align:center;line-height:1.4;transition:opacity .2s;white-space:normal}
  .z.fd:hover .zt{opacity:1}
  .cfb{position:absolute;transform:translate(-50%,-50%);pointer-events:none;z-index:30;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .cfb.m{width:42px;height:42px;border:3px solid var(--miss);background:var(--mb);font-size:17px;animation:fm 1s ease forwards}
  @keyframes fm{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}20%{transform:translate(-50%,-50%) scale(1.1);opacity:1}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}
  .cfb.h{width:50px;height:50px;border:3px solid var(--ok);background:var(--okb);font-size:22px;animation:fh .8s ease forwards}
  @keyframes fh{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}60%{transform:translate(-50%,-50%) scale(1)}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
  .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);padding:10px 22px;border-radius:10px;font-weight:600;font-size:.84rem;z-index:200;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.22,1,.36,1);box-shadow:0 6px 20px rgba(0,0,0,.1);max-width:92vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.s{background:#ecfdf5;color:var(--ok);border:1px solid rgba(39,120,74,.25)}
  .toast.mi{background:#fffbeb;color:var(--miss);border:1px solid rgba(160,117,22,.25)}
  .toast.i{background:#eff6ff;color:#1d4ed8;border:1px solid rgba(29,78,216,.18)}
  .bot{margin-top:20px;display:grid;grid-template-columns:1fr 270px;gap:14px}
  .cd{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px;box-shadow:0 2px 10px var(--sh)}
  .cd h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.9rem;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .fl{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto}
  .fi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:var(--okb);border:1px solid rgba(39,120,74,.1);animation:si .3s ease}
  @keyframes si{0%{opacity:0;transform:translateX(-6px)}100%{opacity:1;transform:translateX(0)}}
  .fi .fn{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.63rem;flex-shrink:0}
  .fi .ft{font-size:.76rem;color:#2a5540;font-weight:500}
  .em{color:var(--muted);font-size:.82rem;text-align:center;padding:20px;font-style:italic}
  .tl2{display:flex;flex-direction:column;gap:10px}
  .sm{display:flex;gap:6px}
  .si2{flex:1;text-align:center;padding:8px;background:#faf8f5;border-radius:8px;border:1px solid var(--border)}
  .si2 .sn{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.15rem}
  .si2 .sl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .btn{padding:10px 16px;border-radius:9px;border:none;font-family:'Figtree',sans-serif;font-weight:600;font-size:.78rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;justify-content:center}
  .bh{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}.bh:hover{background:#fde68a}.bh:disabled{opacity:.4;cursor:not-allowed}
  .br{background:rgba(201,64,45,.07);color:var(--accent);border:1px solid rgba(201,64,45,.18)}.br:hover{background:rgba(201,64,45,.14)}
  .bv{background:var(--accent);color:#fff;box-shadow:0 3px 10px var(--ag)}.bv:hover{transform:translateY(-1px)}
  .hb{font-size:.78rem;color:var(--miss);background:var(--mb);padding:9px 12px;border-radius:7px;border:1px solid rgba(160,117,22,.18);animation:si .3s ease}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px);animation:fi2 .3s ease}
  @keyframes fi2{0%{opacity:0}100%{opacity:1}}
  .md{background:var(--card);border-radius:18px;padding:36px;text-align:center;max-width:400px;width:90%;box-shadow:0 16px 50px rgba(0,0,0,.18);animation:pi2 .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pi2{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .md .tr{font-size:50px;margin-bottom:14px}
  .md h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:6px}
  .md p{color:var(--muted);font-size:.85rem;margin-bottom:20px;line-height:1.5}
  .ms{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
  .ms2{padding:10px 16px;border-radius:10px;background:#faf8f5;border:1px solid var(--border)}
  .ms2 .mn{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.3rem;color:var(--ok)}
  .ms2 .ml{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .fl::-webkit-scrollbar{width:4px}.fl::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  @media(max-width:800px){.bot{grid-template-columns:1fr}.topbar{padding:10px 14px}.main{padding:12px 14px}}


</style>
</head>

<script>
var H=[
  {x:0,y:12,w:10,h:12,label:"First aid kit placed on the floor — hard to access in emergency",hint:"Top-left — where's the first aid equipment? Is it accessible?"},
  {x:15,y:15,w:8,h:14,label:"Wheelchair user near stairs with no ramp access",hint:"Near top-left — can everyone access the building equally?"},
  {x:28,y:20,w:13,h:6,label:"No chocks under the wheels",hint:"Someone is on top of something they shouldn't be — look up"},
  {x:42,y:6,w:8,h:35,label:"Ladder placed at an unsafe angle, lack of 3 support points",hint:"There's a ladder — is it set up at the correct angle?"},
  {x:2,y:35,w:8,h:18,label:"Person smoking indoors — fire hazard and health risk",hint:"Left side — someone is holding something that's a fire risk"},
  {x:25,y:36,w:8,h:14,label:"Person walking blindfolded — collision risk",hint:"Someone on the left can't see where they're going at all"},
  {x:13,y:48,w:12,h:12,label:"Trailing cables across the walkway — trip hazard",hint:"Look at the floor near the center — what's lying across the path?"},
  {x:33,y:37,w:9,h:12,label:"Boxes stacked in the middle of the walkway",hint:"Are the walkways clear of obstructions near the left side?"},
  {x:51,y:7,w:12,h:14,label:"Emergency exit door blocked by debris and steps",hint:"Could people exit quickly through the emergency door?"},
  {x:72,y:11,w:11,h:16,label:"Rubble blocking the path",hint:"Right side — is that construction debris safe for visitors?"},
  {x:95,y:13,w:4,h:20,label:"Fire alarm pull station obstructed",hint:"Far-right wall — can you reach the fire equipment quickly?"},
  {x:81,y:35,w:9,h:16,label:"Mobility scooter user in a cluttered narrow area",hint:"Someone on a scooter navigating between obstacles"},
  {x:70,y:34,w:8,h:14,label:"Unstable stack of boxes near visitors",hint:"Right side — those stacked boxes near people look risky"},
  {x:5,y:62,w:8,h:10,label:"Unsupervised child running near hazards",hint:"Bottom-left — is that child being watched by anyone?"},
  {x:17,y:73,w:24,h:11,label:"Overloaded table with items about to fall off",hint:"That table in the lower-left — can it hold all that weight?"},
  {x:85,y:64,w:6,h:7,label:"Unstable chair",hint:"Someone is lying on the ground — look near the bottom center"},
  {x:46,y:78,w:8,h:17,label:"Elderly person with walking cane tripping on cables",hint:"Near center-bottom — someone with a cane is in trouble"},
  {x:43,y:56,w:9,h:10,label:"Trailing power cables from the speaker's podium",hint:"The cables from the stage equipment — are they routed safely?"},
  {x:84,y:80,w:12,h:14,label:"Hot drinks station with spill risk near walkway",hint:"Bottom-right — is the tea/drinks area set up safely?"},
  {x:62,y:89,w:8,h:10,label:"Broken items and rubbish left on the floor",hint:"Someone left a mess on the floor near the bottom — trip hazard"},
  {x:49,y:31,w:9,h:17,label:"Speaker standing on an unstable elevated platform",hint:"The person giving the speech — is their platform safe and stable?"},
  {x:8,y:81,w:7,h:6,label:"Unstable chair",hint:"Add a hint here"},
  {x:75,y:92,w:7,h:7,label:"Unstable table",hint:"Add a hint here"},
  {x:54,y:81,w:7,h:7,label:"Unsupervised child running near hazards",hint:"Add a hint here"},
  {x:63,y:41,w:7,h:7,label:"Hole in the floor",hint:"Add a hint here"},
];

var found={},fo=[],cl=0,hi=3,rev=false,tt;
function init(){
  document.getElementById('tc').textContent=H.length;
  document.getElementById('scene').addEventListener('click',function(e){
    if(rev)return;
    var r=document.getElementById('img').getBoundingClientRect();
    var xP=((e.clientX-r.left)/r.width)*100;
    var yP=((e.clientY-r.top)/r.height)*100;
    var hit=-1;
    for(var i=0;i<H.length;i++){
      var z=H[i];
      if(xP>=z.x&&xP<=z.x+z.w&&yP>=z.y&&yP<=z.y+z.h){
        if(found[i]){toast('You already found this one!','i');return}
        hit=i;break;
      }
    }
    cl++;document.getElementById('cs').textContent=cl;
    var sr=document.getElementById('scene').getBoundingClientRect();
    var fx=e.clientX-sr.left,fy=e.clientY-sr.top;
    if(hit>=0){
      found[hit]=true;fo.push(hit);
      showFb(fx,fy,true);
      toast('🎯 '+H[hit].label,'s');
      renderZ();uScore();
      if(fo.length===H.length)setTimeout(showComp,900);
    }else{
      showFb(fx,fy,false);
      toast('Nothing here — keep looking!','mi');
    }
    uAcc();
  });
}
function renderZ(){
  var el=document.getElementById('zones');el.innerHTML='';
  for(var i=0;i<H.length;i++){
    if(!found[i])continue;
    var z=H[i];
    var d=document.createElement('div');
    d.className='z fd';
    d.style.left=z.x+'%';d.style.top=z.y+'%';
    d.style.width=z.w+'%';d.style.height=z.h+'%';
    var ord=fo.indexOf(i)+1;
    d.innerHTML='<div class="zn">'+ord+'</div><div class="zt">'+z.label+'</div>';
    el.appendChild(d);
  }
}
function showFb(x,y,isH){
  var sc=document.getElementById('scene');
  var fb=document.createElement('div');
  fb.className='cfb '+(isH?'h':'m');
  fb.style.left=x+'px';fb.style.top=y+'px';
  fb.textContent=isH?'✓':'✕';
  sc.appendChild(fb);
  setTimeout(function(){fb.remove()},isH?800:1000);
}
function toast(m,ty){
  var t=document.getElementById('toast');
  t.textContent=m;t.className='toast '+ty+' show';
  clearTimeout(tt);tt=setTimeout(function(){t.className='toast'},2800);
}
function uScore(){
  var n=fo.length;
  document.getElementById('fc').textContent=n;
  var p=Math.round(n/H.length*100);
  document.getElementById('pbar').style.width=p+'%';
  document.getElementById('plbl').textContent=p+'% complete';
  var l=document.getElementById('flist');
  if(!n){l.innerHTML='<div class="em">Click on the image to start spotting hazards...</div>';return}
  l.innerHTML=fo.map(function(id,i){
    return'<div class="fi"><div class="fn">'+(i+1)+'</div><div class="ft">'+H[id].label+'</div></div>';
  }).join('');
  l.scrollTop=l.scrollHeight;
}
function uAcc(){document.getElementById('as').textContent=cl>0?(Math.round(fo.length/cl*100)+'%'):'—'}
function useHint(){
  if(hi<=0)return;
  var rem=[];for(var i=0;i<H.length;i++){if(!found[i])rem.push(i)}
  if(!rem.length)return;
  hi--;document.getElementById('hs').textContent=hi;
  if(hi<=0)document.getElementById('hbtn').disabled=true;
  var r=rem[Math.floor(Math.random()*rem.length)];
  document.getElementById('hd').innerHTML='<div class="hb">💡 '+H[r].hint+'</div>';
}
function revealAll(){
  rev=true;
  for(var i=0;i<H.length;i++){if(!found[i]){found[i]=true;fo.push(i)}}
  renderZ();uScore();uAcc();toast('All hazards revealed!','i');
}
function resetGame(){
  found={};fo=[];cl=0;hi=3;rev=false;
  document.getElementById('cs').textContent='0';
  document.getElementById('as').textContent='—';
  document.getElementById('hs').textContent='3';
  document.getElementById('hbtn').disabled=false;
  document.getElementById('hd').innerHTML='';
  document.getElementById('cov').innerHTML='';
  renderZ();uScore();
}
function showComp(){
  var a=cl>0?Math.round(fo.length/cl*100):0;
  document.getElementById('cov').innerHTML=
    '<div class="ov" onclick="if(event.target===this)this.remove()"><div class="md"><div class="tr">🏆</div>'+
    '<h2>Congratulations!</h2><p>You found all '+H.length+' hazards! You\'re a true safety expert.</p>'+
    '<div class="ms"><div class="ms2"><div class="mn">'+H.length+'</div><div class="ml">Hazards</div></div>'+
    '<div class="ms2"><div class="mn">'+cl+'</div><div class="ml">Clicks</div></div>'+
    '<div class="ms2"><div class="mn">'+a+'%</div><div class="ml">Accuracy</div></div></div>'+
    '<button class="btn bv" onclick="resetGame();this.closest(\'.ov\').remove()">↻ Play again</button></div></div>';
}
// Tooltip follows mouse on found zones
document.getElementById('zones').addEventListener('mousemove',function(e){
  var zEl=e.target.closest('.z.fd');
  if(!zEl)return;
  var tip=zEl.querySelector('.zt');
  if(!tip)return;
  var tx=e.clientX+12;
  var ty=e.clientY-40;
  var tw=240;
  if(tx+tw>window.innerWidth)tx=e.clientX-tw-12;
  if(ty<60)ty=e.clientY+20;
  tip.style.left=tx+'px';
  tip.style.top=ty+'px';
});

init();
</script>
</body>
</html>
